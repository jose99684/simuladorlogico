<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratorio de Lógica - Análisis Completo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;700&family=JetBrains+Mono&display=swap');

        body {
            font-family: 'Outfit', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }

        .canvas-container {
            background-color: #1e293b;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 1px solid #334155;
        }

        .wire {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: stroke 0.3s ease, filter 0.3s ease;
        }

        /* Color Blanco para el estado 1 (Activo) */
        .wire-on {
            stroke: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.4));
        }

        /* Color Rojo para el estado 0 (Inactivo) */
        .wire-off {
            stroke: #ef4444;
            filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.3));
        }

        .input-node {
            cursor: pointer;
            transition: transform 0.2s;
        }

        .input-node:hover {
            transform: scale(1.05);
        }

        .math-main {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            color: white;
            padding: 1rem 2rem;
            border-radius: 20px;
            font-family: 'JetBrains Mono', monospace;
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.2);
        }

        .analysis-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            overflow: hidden;
        }

        .table-header-alt {
            background-color: #0f172a;
            color: #94a3b8;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .current-row {
            background-color: rgba(59, 130, 246, 0.1) !important;
            border-left: 4px solid #3b82f6;
        }

        .math-font {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-7xl mx-auto space-y-8">
        <!-- Header -->
        <header class="text-center space-y-6">
            <h1 class="text-3xl font-black text-white tracking-tight uppercase">Simulador Lógico Profesional</h1>
            
            <div class="flex flex-wrap justify-center gap-4 items-center">
                <div class="bg-slate-800 border border-slate-700 px-4 py-2 rounded-xl text-slate-400 text-sm math-font">
                    Simplificada: F = (¬A + B) · C
                </div>
                <div class="math-main text-lg md:text-xl">
                    F = (-A * -B * C) + (-A * B * C) + (A * B * C)
                </div>
            </div>
        </header>

        <!-- Main Simulation Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            <!-- Circuito -->
            <div class="lg:col-span-8">
                <div class="canvas-container p-6">
                    <div class="flex justify-between items-center mb-6 border-b border-slate-700 pb-4">
                        <span class="text-[10px] font-black text-slate-500 tracking-widest uppercase">Vista de Diagrama</span>
                        <div class="flex gap-4">
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-white rounded-full shadow-[0_0_8px_white]"></div>
                                <span class="text-[10px] text-slate-400 font-bold uppercase">Valor 1 (Blanco)</span>
                            </div>
                            <div class="flex items-center gap-2">
                                <div class="w-3 h-3 bg-red-500 rounded-full shadow-[0_0_8px_#ef4444]"></div>
                                <span class="text-[10px] text-slate-400 font-bold uppercase">Valor 0 (Rojo)</span>
                            </div>
                        </div>
                    </div>

                    <svg id="circuit-svg" viewBox="0 0 800 500" class="w-full h-auto">
                        <defs>
                            <symbol id="gate-not" viewBox="0 0 60 40">
                                <path d="M 10 5 L 10 35 L 40 20 Z" fill="#f59e0b" />
                                <circle cx="48" cy="20" r="5" fill="#1e293b" stroke="#f59e0b" stroke-width="3" />
                            </symbol>
                            <symbol id="gate-or" viewBox="0 0 80 50">
                                <path d="M 10 5 Q 30 25 10 45 Q 45 45 70 25 Q 45 5 10 5 Z" fill="#10b981" />
                            </symbol>
                            <symbol id="gate-and" viewBox="0 0 80 50">
                                <path d="M 10 5 L 10 45 L 40 45 Q 70 45 70 25 Q 70 5 40 5 Z" fill="#3b82f6" />
                            </symbol>
                        </defs>

                        <g id="wires-group"></g>

                        <!-- Inputs -->
                        <g class="input-node" onclick="toggle('A')">
                            <rect x="40" y="80" width="80" height="60" rx="12" id="bg-A" fill="#334155" />
                            <text x="80" y="120" text-anchor="middle" fill="white" font-size="24" font-weight="bold" id="txt-A">0</text>
                            <text x="80" y="70" text-anchor="middle" fill="#64748b" font-weight="bold" font-size="14">A</text>
                        </g>

                        <g class="input-node" onclick="toggle('B')">
                            <rect x="40" y="220" width="80" height="60" rx="12" id="bg-B" fill="#334155" />
                            <text x="80" y="260" text-anchor="middle" fill="white" font-size="24" font-weight="bold" id="txt-B">0</text>
                            <text x="80" y="210" text-anchor="middle" fill="#64748b" font-weight="bold" font-size="14">B</text>
                        </g>

                        <g class="input-node" onclick="toggle('C')">
                            <rect x="40" y="360" width="80" height="60" rx="12" id="bg-C" fill="#334155" />
                            <text x="80" y="400" text-anchor="middle" fill="white" font-size="24" font-weight="bold" id="txt-C">0</text>
                            <text x="80" y="350" text-anchor="middle" fill="#64748b" font-weight="bold" font-size="14">C</text>
                        </g>

                        <use href="#gate-not" x="200" y="90" width="70" height="50" />
                        <use href="#gate-or" x="360" y="160" width="90" height="60" />
                        <use href="#gate-and" x="560" y="245" width="90" height="60" />

                        <!-- Result -->
                        <g>
                            <circle cx="740" cy="275" r="35" id="circle-F" fill="#0f172a" stroke="#334155" stroke-width="4" />
                            <text x="740" y="285" text-anchor="middle" fill="#334155" font-size="28" font-weight="bold" id="txt-F">0</text>
                            <text x="740" y="335" text-anchor="middle" fill="#94a3b8" font-weight="bold" font-size="14">F</text>
                        </g>
                    </svg>
                </div>
            </div>

            <!-- Tabla Lateral Rápida -->
            <div class="lg:col-span-4">
                <div class="analysis-card p-6 h-full">
                    <h2 class="text-lg font-bold mb-4 text-white flex items-center gap-2">
                        <span class="w-1 h-4 bg-blue-500"></span> Tabla de Verdad
                    </h2>
                    <div class="overflow-hidden rounded-xl border border-slate-700">
                        <table class="w-full text-center text-sm">
                            <thead class="table-header-alt">
                                <tr>
                                    <th class="py-3">A</th>
                                    <th class="py-3">B</th>
                                    <th class="py-3">C</th>
                                    <th class="py-3 text-red-400">F</th>
                                </tr>
                            </thead>
                            <tbody id="quick-table" class="divide-y divide-slate-800"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tabla de Análisis Detallado -->
        <section class="space-y-4">
            <h2 class="text-xl font-bold text-white px-2">Desglose de Valores por Término</h2>
            <div class="analysis-card p-2 md:p-6 shadow-2xl">
                <div class="overflow-x-auto">
                    <table class="w-full text-center math-font">
                        <thead class="table-header-alt">
                            <tr class="border-b border-slate-700">
                                <th class="py-4 px-2">A</th>
                                <th class="py-4 px-2">B</th>
                                <th class="py-4 px-2">C</th>
                                <th class="py-4 px-2 bg-slate-800/50">(-A*-B*C)</th>
                                <th class="py-4 px-2 bg-slate-800/50">(-A*B*C)</th>
                                <th class="py-4 px-2 bg-slate-800/50">(A*B*C)</th>
                                <th class="py-4 px-2 text-red-500 font-black">Resultado F</th>
                            </tr>
                        </thead>
                        <tbody id="detailed-table" class="divide-y divide-slate-800 text-sm">
                            <!-- Filas dinámicas -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        const state = { A: 0, B: 0, C: 0 };

        function toggle(k) {
            state[k] = state[k] === 0 ? 1 : 0;
            update();
        }

        function setRow(a, b, c) {
            state.A = a; state.B = b; state.C = c;
            update();
        }

        function calculateValues(a, b, c) {
            const na = a === 0 ? 1 : 0;
            const nb = b === 0 ? 1 : 0;
            
            const t1 = (na && nb && c) ? 1 : 0;
            const t2 = (na && b && c) ? 1 : 0;
            const t3 = (a && b && c) ? 1 : 0;
            
            return { t1, t2, t3, f: (t1 || t2 || t3) ? 1 : 0, na };
        }

        function update() {
            const current = calculateValues(state.A, state.B, state.C);
            const orRes = (current.na || state.B) ? 1 : 0;

            // Update Inputs
            ['A', 'B', 'C'].forEach(k => {
                document.getElementById(`txt-${k}`).textContent = state[k];
                // El fondo del botón sigue la lógica: Blanco si es 1, Rojo si es 0
                document.getElementById(`bg-${k}`).setAttribute('fill', state[k] ? '#ffffff' : '#ef4444');
                document.getElementById(`txt-${k}`).setAttribute('fill', state[k] ? '#0f172a' : '#ffffff');
            });

            // Update Output
            const circF = document.getElementById('circle-F');
            const txtF = document.getElementById('txt-F');
            circF.setAttribute('stroke', current.f ? '#ffffff' : '#ef4444');
            circF.setAttribute('fill', current.f ? 'rgba(255, 255, 255, 0.1)' : 'rgba(239, 68, 68, 0.1)');
            txtF.textContent = current.f;
            txtF.setAttribute('fill', current.f ? '#ffffff' : '#ef4444');

            // Cables (Cambiado: Blanco para 1, Rojo para 0)
            const wires = [
                { d: "M 120 110 L 200 110", active: state.A === 1 },
                { d: "M 270 115 L 320 115 L 320 180 L 360 180", active: current.na === 1 },
                { d: "M 120 250 L 320 250 L 320 200 L 360 200", active: state.B === 1 },
                { d: "M 450 190 L 510 190 L 510 260 L 560 260", active: orRes === 1 },
                { d: "M 120 390 L 510 390 L 510 290 L 560 290", active: state.C === 1 },
                { d: "M 650 275 L 705 275", active: current.f === 1 }
            ];

            document.getElementById('wires-group').innerHTML = wires.map(w => 
                `<path d="${w.d}" class="wire ${w.active ? 'wire-on' : 'wire-off'}" />`
            ).join('');

            renderTables();
        }

        function renderTables() {
            const quickBody = document.getElementById('quick-table');
            const detailBody = document.getElementById('detailed-table');
            quickBody.innerHTML = '';
            detailBody.innerHTML = '';

            for (let i = 0; i < 8; i++) {
                const a = (i >> 2) & 1;
                const b = (i >> 1) & 1;
                const c = i & 1;
                const vals = calculateValues(a, b, c);
                const isActive = (a === state.A && b === state.B && c === state.C);
                const rowClass = isActive ? 'current-row' : '';

                // Quick Table
                quickBody.innerHTML += `
                    <tr class="table-row ${rowClass}" onclick="setRow(${a},${b},${c})">
                        <td class="py-3">${a}</td>
                        <td class="py-3">${b}</td>
                        <td class="py-3">${c}</td>
                        <td class="py-3 font-bold ${vals.f ? 'text-white' : 'text-red-500'}">${vals.f}</td>
                    </tr>
                `;

                // Detailed Table
                detailBody.innerHTML += `
                    <tr class="${rowClass} hover:bg-slate-800/30 transition-colors" onclick="setRow(${a},${b},${c})">
                        <td class="py-4 text-slate-400">${a}</td>
                        <td class="py-4 text-slate-400">${b}</td>
                        <td class="py-4 text-slate-400">${c}</td>
                        <td class="py-4 ${vals.t1 ? 'text-white font-bold' : 'text-red-500'}">${vals.t1}</td>
                        <td class="py-4 ${vals.t2 ? 'text-white font-bold' : 'text-red-500'}">${vals.t2}</td>
                        <td class="py-4 ${vals.t3 ? 'text-white font-bold' : 'text-red-500'}">${vals.t3}</td>
                        <td class="py-4 font-black ${vals.f ? 'text-white text-lg' : 'text-red-500'}">${vals.f}</td>
                    </tr>
                `;
            }
        }

        update();
    </script>
</body>
</html>
